<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interest Calculator{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Design tokens ─────────────────────────── */
        :root {
            --primary:        #4f46e5;
            --primary-hover:  #4338ca;
            --primary-light:  #eef2ff;
            --accent:         #06b6d4;
            --success:        #10b981;
            --warning:        #f59e0b;
            --danger:         #ef4444;
            --surface:        #ffffff;
            --bg:             #f8fafc;
            --border:         #e2e8f0;
            --text-primary:   #1e293b;
            --text-secondary: #64748b;
            --shadow-sm:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow-md:      0 4px 12px rgba(0,0,0,.08);
            --radius:         12px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── Navbar ────────────────────────────────── */
        .app-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 1.5rem;
            height: 60px;
        }
        .app-nav .brand {
            font-size: 1.1rem; font-weight: 700; color: var(--primary);
            letter-spacing: -0.3px; display: flex; align-items: center;
            gap: .5rem; text-decoration: none; white-space: nowrap;
        }
        .brand-icon {
            width: 32px; height: 32px; background: var(--primary);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; color: #fff; font-size: .9rem; flex-shrink: 0;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: .15rem;
            margin-left: auto;
        }
        .nav-link-item {
            font-size: .875rem; font-weight: 500; color: var(--text-secondary);
            text-decoration: none; padding: .35rem .75rem; border-radius: 7px;
            transition: background .15s, color .15s; white-space: nowrap;
            display: inline-flex; align-items: center; gap: .35rem;
        }
        .nav-link-item:hover { background: var(--primary-light); color: var(--primary); }
        .nav-link-item.active {
            color: var(--primary); background: var(--primary-light); font-weight: 600;
        }

        /* ── Hamburger ─────────────────────────────── */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 36px; height: 36px;
            background: none; border: none; cursor: pointer;
            border-radius: 8px; transition: background .15s;
            margin-left: auto; flex-shrink: 0; padding: 0;
        }
        .hamburger:hover { background: var(--primary-light); }
        .hamburger .bar {
            width: 20px; height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: transform .28s ease, opacity .2s ease;
            display: block;
        }
        .hamburger.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ── Page wrapper ──────────────────────────── */
        .page-wrapper { max-width: 1200px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
        .page-header { margin-bottom: 1.75rem; }
        .page-header h1 {
            font-size: clamp(1.4rem, 4vw, 1.9rem); font-weight: 700;
            color: var(--text-primary); letter-spacing: -0.5px;
        }
        .page-header p { color: var(--text-secondary); font-size: .9rem; margin-top: .25rem; }

        /* ── Tab Navigation ────────────────────────── */
        .tab-nav {
            display: flex; gap: 0; border-bottom: 2px solid var(--border);
            margin-bottom: 2rem; overflow-x: auto;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: none; border: none;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
            padding: .75rem 1.25rem; font-family: inherit;
            font-size: .9rem; font-weight: 500; color: var(--text-secondary);
            cursor: pointer; white-space: nowrap;
            display: inline-flex; align-items: center; gap: .45rem;
            transition: color .2s, border-color .2s; border-radius: 0;
        }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary); border-bottom-color: var(--primary); font-weight: 600;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: tabFadeIn .22s ease; }
        @keyframes tabFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Card ──────────────────────────────────── */
        .card-clean {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow-sm);
            padding: 1.5rem; margin-bottom: 1.75rem;
        }
        .card-title {
            font-size: .78rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .8px; color: var(--text-secondary); margin-bottom: 1.25rem;
        }

        /* ── Summary Cards ─────────────────────────── */
        .summary-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .summary-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.1rem 1.25rem;
            box-shadow: var(--shadow-sm); transition: box-shadow .2s, transform .2s;
        }
        .summary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .summary-card .sc-label {
            font-size: .72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .7px; color: var(--text-secondary); margin-bottom: .35rem;
        }
        .summary-card .sc-value {
            font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }
        .summary-card.accent-primary { border-left: 3px solid var(--primary); }
        .summary-card.accent-success { border-left: 3px solid var(--success); }
        .summary-card.accent-accent  { border-left: 3px solid var(--accent); }
        .summary-card.accent-warning { border-left: 3px solid var(--warning); }

        /* ── Home section layout ───────────────────── */
        .home-section { margin-bottom: 2rem; }
        .home-section-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem;
        }
        .home-section-header h2 {
            font-size: 1rem; font-weight: 600; color: var(--text-primary);
            display: flex; align-items: center; gap: .4rem;
        }
        .home-divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }

        /* ── Form ──────────────────────────────────── */
        .form-label-sm {
            font-size: .78rem; font-weight: 500; color: var(--text-secondary);
            margin-bottom: .3rem; display: block;
        }
        .form-control, .form-select {
            border: 1.5px solid var(--border); border-radius: 8px;
            padding: .55rem .85rem; font-size: .9rem; color: var(--text-primary);
            background: var(--bg); transition: border-color .2s, box-shadow .2s;
            width: 100%; font-family: inherit;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12);
            outline: none; background: var(--surface);
        }
        .form-control::placeholder { color: #a0aec0; }

        /* ── Buttons ───────────────────────────────── */
        .btn-primary-custom {
            background: var(--primary); color: #fff; border: none; border-radius: 8px;
            padding: .6rem 1.25rem; font-size: .9rem; font-weight: 600;
            font-family: inherit; cursor: pointer;
            transition: background .2s, transform .15s, box-shadow .2s;
            display: inline-flex; align-items: center; gap: .4rem;
        }
        .btn-primary-custom:hover {
            background: var(--primary-hover); transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79,70,229,.3);
        }
        .btn-warning-custom {
            background: var(--warning); color: #fff; border: none; border-radius: 8px;
            padding: .6rem 1.25rem; font-size: .9rem; font-weight: 600;
            font-family: inherit; cursor: pointer;
            transition: background .2s, transform .15s, box-shadow .2s;
            display: inline-flex; align-items: center; gap: .4rem;
        }
        .btn-warning-custom:hover {
            background: #d97706; transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245,158,11,.3);
        }
        .btn-secondary-custom {
            background: transparent; color: var(--text-secondary);
            border: 1.5px solid var(--border); border-radius: 8px;
            padding: .6rem 1.25rem; font-size: .9rem; font-weight: 500;
            font-family: inherit; cursor: pointer;
            transition: border-color .2s, color .2s, background .2s;
            display: inline-flex; align-items: center; gap: .4rem; text-decoration: none;
        }
        .btn-secondary-custom:hover {
            border-color: #94a3b8; color: var(--text-primary); background: var(--bg);
        }
        .btn-link {
            background: none; border: none; padding: 0; color: var(--primary);
            font-size: inherit; font-family: inherit; font-weight: 600;
            cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
        }
        .btn-link:hover { color: var(--primary-hover); }

        /* ── Table ─────────────────────────────────── */
        .table-wrapper {
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); margin-bottom: 1.75rem;
        }
        .data-table {
            width: 100%; border-collapse: collapse; font-size: .875rem; background: var(--surface);
        }
        .data-table thead th {
            background: #1e293b; color: #e2e8f0; font-size: .75rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: .6px;
            padding: .85rem 1rem; white-space: nowrap; border: none;
        }
        .data-table thead th:first-child { border-radius: calc(var(--radius) - 1px) 0 0 0; }
        .data-table thead th:last-child  { border-radius: 0 calc(var(--radius) - 1px) 0 0; }
        .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
        .data-table tbody tr:last-child { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--primary-light); }
        .data-table tbody td { padding: .8rem 1rem; color: var(--text-primary); white-space: nowrap; }
        .data-table .total-row td {
            background: #ecfdf5; color: #065f46; font-weight: 700; border-top: 2px solid #6ee7b7;
        }
        .amount { font-variant-numeric: tabular-nums; }

        /* ── Table action buttons ──────────────────── */
        .btn-table-edit {
            background: #fef3c7; color: #92400e; border: 1px solid #fcd34d;
            border-radius: 6px; padding: .3rem .7rem; font-size: .78rem; font-weight: 600;
            text-decoration: none; transition: background .15s, transform .15s;
            display: inline-flex; align-items: center; gap: .25rem;
        }
        .btn-table-edit:hover { background: #fde68a; transform: translateY(-1px); color: #78350f; }
        .btn-table-delete {
            background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5;
            border-radius: 6px; padding: .3rem .7rem; font-size: .78rem; font-weight: 600;
            text-decoration: none; transition: background .15s, transform .15s;
            display: inline-flex; align-items: center; gap: .25rem;
        }
        .btn-table-delete:hover { background: #fecaca; transform: translateY(-1px); color: #7f1d1d; }

        /* ── Edit / formula banners ────────────────── */
        .edit-banner {
            background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
            padding: .65rem 1rem; display: flex; align-items: center; gap: .5rem;
            font-size: .85rem; font-weight: 500; color: #92400e; margin-bottom: 1rem;
        }
        .formula-hint {
            background: var(--primary-light); border: 1px solid #c7d2fe;
            border-radius: 8px; padding: .65rem 1rem; font-size: .83rem;
            color: #3730a3; margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: .5rem;
        }
        .formula-hint code {
            font-family: 'Menlo', 'Consolas', monospace; font-size: .82rem;
            background: rgba(79,70,229,.1); padding: .1rem .35rem; border-radius: 4px;
        }

        /* ── Daily breakdown table ─────────────────── */
        .breakdown-table thead th {
            background: #334155; font-size: .72rem; padding: .7rem .85rem;
        }
        .breakdown-table tbody tr:hover { background: #f0fdf4; }
        .breakdown-table tbody td { padding: .65rem .85rem; font-size: .83rem; }
        .breakdown-table .day-total-row td {
            background: #d1fae5; color: #065f46; font-weight: 700; border-top: 1.5px solid #6ee7b7;
        }
        .btn-expand {
            background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd;
            border-radius: 6px; padding: .3rem .7rem; font-size: .78rem; font-weight: 600;
            cursor: pointer; transition: background .15s, transform .15s;
            display: inline-flex; align-items: center; gap: .25rem;
        }
        .btn-expand:hover { background: #ddd6fe; transform: translateY(-1px); }
        .breakdown-panel {
            display: none; padding: 1rem 1rem 1.25rem;
            background: #f8fafc; border-top: 1px solid var(--border);
        }
        .breakdown-panel.open { display: block; animation: fadeDown .18s ease; }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Empty states ──────────────────────────── */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; }
        .empty-state p { font-size: .9rem; }
        .empty-state-inline { font-size: .88rem; color: var(--text-secondary); padding: .75rem 0; }

        /* ── Status toggles ─────────────────────────── */
        .toggle-paid, .toggle-rcvd {
            background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7;
            border-radius: 20px; padding: .25rem .8rem; font-size: .78rem; font-weight: 600;
            cursor: pointer; transition: all .15s;
            display: inline-flex; align-items: center; gap: .3rem; white-space: nowrap;
        }
        .toggle-paid:hover, .toggle-rcvd:hover { background: #a7f3d0; }
        .toggle-unpaid {
            background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5;
            border-radius: 20px; padding: .25rem .8rem; font-size: .78rem; font-weight: 600;
            cursor: pointer; transition: all .15s;
            display: inline-flex; align-items: center; gap: .3rem; white-space: nowrap;
        }
        .toggle-unpaid:hover { background: #fecaca; }
        .toggle-not-rcvd {
            background: #fef3c7; color: #92400e; border: 1px solid #fcd34d;
            border-radius: 20px; padding: .25rem .8rem; font-size: .78rem; font-weight: 600;
            cursor: pointer; transition: all .15s;
            display: inline-flex; align-items: center; gap: .3rem; white-space: nowrap;
        }
        .toggle-not-rcvd:hover { background: #fde68a; }

        .summary-card.accent-danger { border-left: 3px solid var(--danger); }
        .summary-card.accent-teal   { border-left: 3px solid #0d9488; }

        /* badge pill for pending counts */
        .badge-count {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--danger); color: #fff; border-radius: 10px;
            min-width: 20px; height: 20px; font-size: .72rem; font-weight: 700; padding: 0 .4rem;
        }

        /* Earned overview section */
        .earned-section {
            background: #1e293b; border-radius: var(--radius);
            padding: 1.5rem; margin-top: 2rem;
        }
        .earned-section .section-label {
            font-size: .72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .8px; color: #94a3b8; margin-bottom: 1rem;
        }
        .earned-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;
        }
        .earned-card {
            background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
            border-radius: 10px; padding: 1.1rem 1.25rem;
        }
        .earned-card .ec-label {
            font-size: .72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .6px; color: #94a3b8; margin-bottom: .3rem;
        }
        .earned-card .ec-value {
            font-size: 1.35rem; font-weight: 700; color: #f1f5f9;
            font-variant-numeric: tabular-nums;
        }

        /* Responsive ───────────────────────────────────────── */
        @media (max-width: 640px) {
            .page-wrapper { padding: 1.25rem .9rem 3rem; }
            .card-clean   { padding: 1.1rem; }
            .data-table tbody td, .data-table thead th { padding: .65rem .75rem; }
            .tab-btn { padding: .7rem .9rem; font-size: .85rem; }
            .summary-card .sc-value { font-size: 1.1rem; }
        }

        /* ── Mobile Nav ────────────────────────────── */
        @media (max-width: 767px) {
            .hamburger { display: flex; }
            .nav-links {
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                margin-left: 0;
                /* slide-down animation */
                max-height: 0;
                overflow: hidden;
                transition: max-height .35s cubic-bezier(.4,0,.2,1);
                border-top: 1px solid transparent;
            }
            .nav-links.mobile-open {
                max-height: 260px;
                border-top-color: var(--border);
            }
            .nav-link-item {
                padding: .85rem 1.5rem;
                border-radius: 0;
                font-size: .925rem;
                border-bottom: 1px solid var(--border);
            }
            .nav-link-item:last-child { border-bottom: none; }
            .nav-link-item.active {
                background: var(--primary-light);
                border-left: 3px solid var(--primary);
                padding-left: calc(1.5rem - 3px);
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body {% block body_attrs %}{% endblock %}>

<!-- Shared navbar: defined ONCE here in base.html -->
<nav class="app-nav" id="app-nav">
    <div class="nav-inner">
        <a href="/" class="brand">
            <span class="brand-icon">&#8377;</span>
            Interest Calc
        </a>
        <div class="nav-links" id="nav-menu">
            <a href="/" class="nav-link-item {% block active_dashboard %}{% endblock %}">&#127968; Dashboard</a>
            <a href="{% url 'monthly_loans' %}" class="nav-link-item {% block active_monthly %}{% endblock %}">&#128197; Monthly Loans</a>
            <a href="{% url 'daily_loan_calculator' %}" class="nav-link-item {% block active_daily %}{% endblock %}">&#128198; Daily Loans</a>
            <a href="{% url 'seafoods' %}" class="nav-link-item {% block active_seafoods %}{% endblock %}">&#129408; Sea Foods</a>
        </div>
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu" aria-expanded="false">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
<script>
    /* Hamburger mobile nav */
    (function () {
        var btn  = document.getElementById('hamburger-btn');
        var menu = document.getElementById('nav-menu');
        if (!btn || !menu) return;
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var open = menu.classList.toggle('mobile-open');
            btn.classList.toggle('open', open);
            btn.setAttribute('aria-expanded', String(open));
        });
        document.addEventListener('click', function (e) {
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('mobile-open');
                btn.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
            }
        });
        /* Close on nav-link tap (mobile) */
        menu.querySelectorAll('.nav-link-item').forEach(function (link) {
            link.addEventListener('click', function () {
                menu.classList.remove('mobile-open');
                btn.classList.remove('open');
                btn.setAttribute('aria-expanded', 'false');
            });
        });
    })();
</script>
</body>
</html>
